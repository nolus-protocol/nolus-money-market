lints = { workspace = true }

[package]
name = "dex"
version = "0.2.3"
edition.workspace = true
authors.workspace = true
license.workspace = true
rust-version.workspace = true

[package.metadata.cargo-each]
combinations = [{ tags = ["ci", "@agnostic"], feature-groups = ["impl-or-testing"], include-rest = false }]
feature-groups = { impl-or-testing = { members = ["impl","testing",], at-least-one = false, mutually-exclusive = true }}

# the drain tests need `timealarms/testing` (`TimeAlarmsRef::unchecked`), but
# dev-dependencies cannot be feature-gated, so under the feature-less
# combination — where every timealarms-consuming module is `impl`-gated out —
# cargo-udeps sees the dev-dependency as unused, and its presence in the
# resolved graph makes the optional regular dependency (off without
# `dep:timealarms`) get reported as unused too
[package.metadata.cargo-udeps.ignore]
development = ["timealarms"]
normal = ["timealarms"]


[features]
impl = [
    "dep:access-control",
    "dep:oracle-platform",
    "oracle/stub_price",
    "dep:timealarms",
]
migration = []
testing = ["finance/testing"]

[dependencies]
cw-time = { workspace = true }
access-control = { workspace = true, optional = true }
currency = { workspace = true }
finance = { workspace = true }
oracle = { workspace = true, features = ["stub_swap"] }
oracle-platform = { workspace = true, optional = true }
timealarms = { workspace = true, optional = true, features = ["stub"] }
platform = { workspace = true }
sdk = { workspace = true }

serde = { workspace = true, features = ["derive"] }
thiserror = { workspace = true }

[dev-dependencies]
currency = { workspace = true, features = ["testing"] }
finance = { workspace = true, features = ["testing"] }
oracle-platform = { workspace = true, features = ["testing"] }
platform = { workspace = true, features = ["testing"] }
timealarms = { workspace = true, features = ["stub", "testing"] }
